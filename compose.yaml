version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-container

    environment:
      POSTGRES_DB: shortner
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: springboot-app

    ports:
      - "8080:8080"

    depends_on:
      - postgres

volumes:
  postgres_data: